# ======================================================
# RelicForging Configuration
# All values here are hot-reloadable with /relicadmin reload
# ======================================================

# ------- General ----------------------------------------
# How often (ticks) passive effects are re-applied. 20 ticks = 1 second.
passive-tick-interval: 20

# How often (ticks) energy regenerates for equipped relics.
energy-regen-interval: 20

# Whether the action bar shows cooldown / energy info while a relic is equipped.
show-action-bar: true

# ------- Leveling ---------------------------------------
# XP required to advance from one level to the next.
# The system uses: xp_needed = base * (level ^ exponent)
xp-base: 100
xp-exponent: 1.4

# Maximum level across all tiers (Tier I: 1-10, II: 11-20, III: 21-30)
max-level: 30

